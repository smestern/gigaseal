# Fly.io manifest for the gigaseal public-demo deployment.
#
# One-time setup:
#   fly auth login
#   fly launch --no-deploy --copy-config --name gigaseal-web
#   fly secrets set GIGASEAL_SECRET_KEY=$(openssl rand -hex 32)
#   fly deploy
#
# Free-tier sizing: one shared-cpu-1x VM at 512 MB. Sessions are
# stored on the ephemeral root filesystem and pruned after 1 h, so no
# volume is needed.

app = "gigaseal-web"
primary_region = "ord"

[build]
  dockerfile = "../../Dockerfile"

[env]
  GIGASEAL_WEB_PROFILE = "public"
  GIGASEAL_SESSION_DIR = "/tmp/gigaseal_sessions"
  GIGASEAL_SESSION_TTL_H = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
